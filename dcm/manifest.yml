      ret_db: 'RETAIL_DB_UAT'
      ana_db: 'ANALYTICS_DB_UAT'
      loy_db: 'LOYALTY_DB_UAT'
      sal_db: 'SALES_DB_UAT'
      hr_db: 'HR_DB_UAT'
