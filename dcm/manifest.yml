    loy_db: 'LOYALTY_DB_DEV'
    sal_db: 'SALES_DB_DEV'
    hr_db: 'HR_DB_DEV'
    warehouses:
      - name: MGMT
        wh_size: 'XSMALL'
        auto_suspend: 60
        comment: 'Management — governance, admin, orchestration'
      - name: FIN
        wh_size: 'XSMALL'
        auto_suspend: 120
        comment: 'Finance — reporting and reconciliation'
      - name: MKT
        wh_size: 'XSMALL'
        auto_suspend: 120
        comment: 'Marketing — campaigns and attribution'
      - name: ECO
        wh_size: 'XSMALL'
        auto_suspend: 120
        comment: 'E-Commerce — orders and catalog'
