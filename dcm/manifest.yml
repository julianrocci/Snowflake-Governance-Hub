        wh_size: 'XSMALL'
        auto_suspend: 300
        comment: 'Analytics — dashboards and ad-hoc queries (high concurrency)'
      - name: LOY
        wh_size: 'XSMALL'
        auto_suspend: 120
        comment: 'Loyalty — rewards and customer programs'
