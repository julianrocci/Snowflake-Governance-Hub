        wh_size: 'XSMALL'
        auto_suspend: 300
        comment: 'ELT/dbt transformations (heavy workload)'
  configurations:
    DEV:
      env_suffix: '_DEV'
      mgmt_db: 'MGMT_DB_DEV'
      fin_db: 'FINANCE_DB_DEV'
      mkt_db: 'MARKETING_DB_DEV'
      eco_db: 'ECOMMERCE_DB_DEV'
      ret_db: 'RETAIL_DB_DEV'
