# Used as environment variable for DCM
manifest_version: 1
type: DCM_PROJECT

default_target: dev

targets:
  # DCM target is stored in a dedicated Management DB
  dev:
    account_identifier: <your_account_locator>
    project_name: MGMT_DB_DEV.DCM.COST_GOV_PROJECT_DEV
    project_owner: DCM_ADMIN
    templating_config: dev

  prod:
    account_identifier: <your_account_locator>
    project_name: MGMT_DB_PROD.DCM.COST_GOV_PROJECT_PROD
    project_owner: DCM_ADMIN
    templating_config: prod

templating:
  defaults:
    env_suffix: "_DEV"
    mgmt_db: "MGMT_DB_DEV"
    gov_db: "GOVERNANCE_DB_DEV"
    fin_db: "FINANCE_DB_DEV"
    mkt_db: "MARKETING_DB_DEV"
    eco_db: "ECOMMERCE_DB_DEV"
    ret_db: "RETAIL_DB_DEV"
    ana_db: "ANALYTICS_DB_DEV"
  
  configurations:
    dev:
      env_suffix: "_DEV"
      mgmt_db: "MGMT_DB_DEV"
      gov_db: "GOVERNANCE_DB_DEV"
      fin_db: "FINANCE_DB_DEV"
      mkt_db: "MARKETING_DB_DEV"
      eco_db: "ECOMMERCE_DB_DEV"
      ret_db: "RETAIL_DB_DEV"
      ana_db: "ANALYTICS_DB_DEV"
    prod:
      env_suffix: "_PROD"
      mgmt_db: "MGMT_DB_PROD"
      gov_db: "GOVERNANCE_DB_PROD"
      fin_db: "FINANCE_DB_PROD"
      mkt_db: "MARKETING_DB_PROD"
      eco_db: "ECOMMERCE_DB_PROD"
      ret_db: "RETAIL_DB_PROD"
      ana_db: "ANALYTICS_DB_PROD"