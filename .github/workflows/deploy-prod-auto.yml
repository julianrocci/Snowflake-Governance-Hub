name: Deploy PROD (Auto)

on:
  push:
    branches:
      - main

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install "snowflake-cli>=3.16" "dbt-snowflake~=1.9.0"

      - name: Write private key to file
        run: echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/rsa_key.p8

      - name: Configure Snow CLI
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml << EOF
          [connections.default]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          authenticator = "SNOWFLAKE_JWT"
          private_key_file = "/tmp/rsa_key.p8"
          role = "DCM_DEPLOYER"
          warehouse = "TRANSFORM_WH"
          EOF
          chmod 0600 ~/.snowflake/config.toml

      - name: DCM Deploy
        working-directory: dcm
        run: |
          snow dcm deploy MGMT_DB.DCM.COST_GOVERNANCE_DCM \
            --target PROD \
            --connection default

      - name: Post-deploy Future Grants
        run: |
          snow sql -q "CALL MGMT_DB.DCM.SETUP_FUTURE_GRANTS('PROD')" \
            --connection default

      - name: Generate dbt profiles for CI/CD
        run: |
          cat > dbt/profiles.yml << EOF
          default:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: $SNOWFLAKE_ACCOUNT
                user: $SNOWFLAKE_USER
                private_key_path: /tmp/rsa_key.p8
                role: ACCOUNTADMIN
                database: MGMT_DB
                warehouse: TRANSFORM_WH
                schema: COST_GOVERNANCE
                threads: 4
          EOF

      - name: dbt Build
        run: dbt build --project-dir dbt --profiles-dir dbt --target prod

      - name: Deploy Streamlit App
        run: |
          snow stage copy streamlit/user_grants_manager/app.py \
            @MGMT_DB.USER_MANAGEMENT.USER_GRANTS_MANAGER_STAGE/streamlit/user_grants_manager/ \
            --connection default --overwrite