version: 2

models:
  - name: fct_quality_monitoring
    description: "Unified data quality monitoring combining freshness gaps and technical failures"
    columns:
      - name: event_timestamp
        data_tests:
          - not_null
      - name: category
        data_tests:
          - not_null
          - accepted_values:
              values: ['DATA_FLOW', 'TECHNICAL_ERROR']
      - name: is_alert
        description: "1 if the event requires attention, 0 if healthy"
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]