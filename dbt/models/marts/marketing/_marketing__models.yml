version: 2

models:
  - name: rpt_cohort_retention
    description: "Cohort retention analysis with retention rate and revenue per cohort/month"
    config:
      tags: ['marketing', 'weekly']
    columns:
      - name: cohort_month
        data_tests:
          - not_null
      - name: month_number
        data_tests:
          - not_null
      - name: retention_rate_percentage
        description: "Percentage of cohort users who returned in this month (0-100%)"
      - name: total_revenue_chf
        description: "Total revenue generated by returning users in this period"