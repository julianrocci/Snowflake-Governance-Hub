version: 2

sources:
  - name: snowflake_usage
    database: SNOWFLAKE
    schema: ACCOUNT_USAGE
    loader: snowflake_shares
    description: "Raw usage and metadata from Snowflake database"
    
    tables:
      - name: query_history
        description: "Execution logs for all queries in the last 365 days"
        tests:
          - unique:
              column_name: query_id
          - not_null:
              column_name: query_id

      - name: warehouse_metering_history
        description: "Hourly credit consumption for each warehouse"

      - name: login_history
        description: "History of user logins and authentication results"

      - name: access_history
        description: "Tracks which users accessed which columns/tables"

      - name: automatic_clustering_history
        description: "Credits consumed by automatic reclustering operations"